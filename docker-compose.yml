version: '3.9'

services:
  db:
    image: mysql:8.0
    container_name: team_task_manager_db
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: root1234
      MYSQL_DATABASE: taskflow
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    container_name: team_task_manager_api
    restart: unless-stopped
    build:
      context: ./backend
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: mysql+pymysql://root:root1234@db:3306/taskflow
      SECRET_KEY: 8b39f3db37f7ecd67d6dfbb52a56b1d270af70424c25d50bc2e9510c8933e30a
      ALGORITHM: HS256
      ACCESS_TOKEN_EXPIRE_MINUTES: 1440
      CORS_ORIGINS: '["http://localhost:3000"]'
    depends_on:
      db:
        condition: service_healthy

  frontend:
    container_name: team_task_manager_ui
    restart: unless-stopped
    build:
      context: ./frontend
    ports:
      - "3000:80"
    depends_on:
      - backend

volumes:
  mysql_data:
